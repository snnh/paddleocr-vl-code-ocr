# 公开训练参数摘要；最终参数以正式提交模型卡为准。
base_model: PaddleOCR-VL-1.6
task: developer_code_ocr
prompt: "<image>OCR:"
finetune_method: LoRA
model_version: v6
competition_stage: finals_technical_freeze

recommended_inference:
  max_tokens: 4096
  repetition_penalty: 1.08
  temperature: 0

v6_training_summary:
  max_seq_len: 16384
  lora_rank: 8
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  num_train_epochs: 2
  learning_rate: 2.0e-4
  min_lr: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  adam_beta2: 0.95
  seed: 23

benchmark_v5_content_5_2:
  samples: 304
  final_score_v5: 58.4427
  global_sample_mean_score_v5: 73.3494
  avg_ned: 0.1744
  direct_usable_rate: 0.381579
  completion_rate: 0.990132
  safety_score: 0.907895

data_policy:
  train_data_public: false
  eval_data_public_in_github: false
  frozen_benchmark_used_for_training: false

notes:
  - "v6 是模型版本；Benchmark v5 和内容版本 5.2 是评测版本。"
  - "模型 v6 是当前决赛技术冻结方案，公开仓库仅保留策略摘要。"
  - "完整训练 notebook 不放入公开仓库。"
  - "正式模型文件发布在 Hugging Face: https://huggingface.co/snnh/paddleocr_vl_code_ocr"
